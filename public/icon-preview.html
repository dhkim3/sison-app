<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sison Icon Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 48px 24px;
    }
    h1 { font-size: 15px; color: #555; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
    .row {
      display: flex;
      align-items: flex-end;
      gap: 32px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .label {
      font-size: 11px;
      color: #888;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    img.icon {
      display: block;
      /* iOS-style drop shadow */
      filter: drop-shadow(0px 6px 18px rgba(0,0,0,0.18))
              drop-shadow(0px 2px 4px rgba(0,0,0,0.10));
    }
    /* iOS squircle clip using border-radius ~22.5% */
    img.icon { border-radius: 22.5%; }

    .dark-bg {
      background: #1c1c1e;
      border-radius: 20px;
      padding: 32px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .dark-bg .label { color: #888; }
  </style>
</head>
<body>

  <h1>시선 — Icon Refinement Preview</h1>

  <div class="row">
    <div class="item">
      <img class="icon" src="icon-refined.svg" width="60" height="60" alt="Icon 60px"/>
      <span class="label">60 px</span>
    </div>
    <div class="item">
      <img class="icon" src="icon-refined.svg" width="120" height="120" alt="Icon 120px"/>
      <span class="label">120 px</span>
    </div>
    <div class="item">
      <img class="icon" src="icon-refined.svg" width="180" height="180" alt="Icon 180px"/>
      <span class="label">180 px</span>
    </div>
    <div class="item">
      <img class="icon" src="icon-refined.svg" width="256" height="256" alt="Icon 256px"/>
      <span class="label">256 px</span>
    </div>
  </div>

  <!-- Dark wallpaper simulation -->
  <div class="dark-bg">
    <span class="label" style="color:#666;">On dark wallpaper</span>
    <div class="row">
      <div class="item">
        <img class="icon" src="icon-refined.svg" width="60" height="60" alt="Icon 60px dark"/>
        <span class="label">60 px</span>
      </div>
      <div class="item">
        <img class="icon" src="icon-refined.svg" width="180" height="180" alt="Icon 180px dark"/>
        <span class="label">180 px</span>
      </div>
    </div>
  </div>

  <!-- Full size reference -->
  <div class="item">
    <img class="icon" src="icon-refined.svg" width="512" height="512" alt="Icon 512px"/>
    <span class="label">512 px — reference</span>
  </div>

</body>
</html>
